upstream react_upstream {
    server react:3000;
    keepalive 32;
}

upstream laravel_upstream {
    server laravel:9000;
}

# ─── HTTP server ─────────────────────────────────────────────
# This is the FALLBACK base config (used when no override volume is mounted).
# In development: default.dev.conf is mounted over this via docker-compose.override.yml
# In production:  default.prod.conf is mounted over this via docker-compose.prod.yml
server {
    listen 80;
    listen [::]:80;
    server_name localhost electro05.ma www.electro05.ma;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ─── Health check (used by Docker healthcheck) ────────────
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ─── API — Proxy to Laravel (PHP-FPM via FastCGI) ─────────
    location /api/ {
        include fastcgi_params;
        fastcgi_pass laravel:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param REQUEST_URI     $uri$is_args$args;
        fastcgi_read_timeout 120s;
        fastcgi_send_timeout 60s;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 8 16k;
    }

    # ─── Sanctum CSRF Cookie ─────────────────────────────────
    location /sanctum/ {
        include fastcgi_params;
        fastcgi_pass laravel:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param REQUEST_URI     $uri$is_args$args;
    }

    # ─── Storage — Serve Laravel public files ─────────────────
    location /storage/ {
        alias /var/www/api/storage/app/public/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;
    }

    # ─── SPA — Proxy to React dev server ──────────────────────
    location / {
        proxy_pass http://react_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 10s;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# NOTE: HTTPS server block is intentionally removed from this base config.
# SSL is only needed in production and is handled in default.prod.conf.
# Having an HTTPS block here with a self-include caused recursive include errors.
