upstream react_upstream {
    server react:3000;
    keepalive 32;
}

upstream laravel_upstream {
    server laravel:9000;
}

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Health check (used by Docker healthcheck) ────────────
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Test PHP input (temp)
    location /test-input.php {
        include fastcgi_params;
        fastcgi_pass laravel:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/public/test-input.php;
    }

    # ─── API — Proxy to Laravel (PHP-FPM via FastCGI) ─────────
    location /api/ {
        include fastcgi_params;
        fastcgi_pass laravel:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_read_timeout 120s;
        fastcgi_send_timeout 60s;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 8 16k;

        # CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Accept, Authorization, Content-Type, X-Requested-With, X-CSRF-TOKEN, X-XSRF-TOKEN" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }
    }

    # ─── Storage — Serve Laravel public files ─────────────────
    location /storage/ {
        alias /var/www/api/public/storage/app/public/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;
    }

    # ─── Sanctum CSRF Cookie ─────────────────────────────────
    location /sanctum/ {
        include fastcgi_params;
        fastcgi_pass laravel:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param REQUEST_URI     $uri$is_args$args;
    }

    # ─── React Dev Server (SPA + HMR WebSocket) ───────────────
    location / {
        proxy_pass http://react_upstream;
        proxy_http_version 1.1;
        # Required for WebSocket (HMR hot-reload)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        # Long timeout needed for HMR (server-sent events stay open)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 10s;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
