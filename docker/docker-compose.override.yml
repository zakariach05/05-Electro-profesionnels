services:
  # ─── Nginx (dev override) ────────────────────────────────────
  # In dev mode, Nginx must wait for the React dev server to be healthy
  # before starting, otherwise it will try to proxy to react:3000 and
  # immediately get connection refused on every page load.
  nginx:
    depends_on:
      laravel:
        condition: service_healthy
      react:
        condition: service_healthy
    volumes:
      - type: bind
        source: ./nginx/default.dev.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true

  # ─── React (dev override) ────────────────────────────────────
  react:
    profiles:
      - dev
    stdin_open: true
    tty: true
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - FAST_REFRESH=true
      - HOST=0.0.0.0
      - WDS_SOCKET_PORT=0
    # Override the healthcheck with a longer start_period for dev
    # (CRA needs 60–120s to compile on first run)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    volumes:
      # Named volume from base compose (carries production build files)
      - react-build:/build
      # Bind-mount source for live-reload — changes in src/ reflect instantly
      - type: bind
        source: ../Frond-end/test/src
        target: /app/src
      - type: bind
        source: ../Frond-end/test/public
        target: /app/public
      - type: bind
        source: ../Frond-end/test/package.json
        target: /app/package.json
      - type: bind
        source: ../Frond-end/test/package-lock.json
        target: /app/package-lock.json
      - type: bind
        source: ../Frond-end/test/tailwind.config.js
        target: /app/tailwind.config.js
      - type: bind
        source: ../Frond-end/test/postcss.config.js
        target: /app/postcss.config.js

  # ─── Laravel (dev override) ──────────────────────────────────
  laravel:
    volumes:
      - laravel-storage:/var/www/storage
      - laravel-framework:/var/www/bootstrap/cache
      # Bind-mount source directories for live edits
      - type: bind
        source: ../Back-end/app
        target: /var/www/app
      - type: bind
        source: ../Back-end/config
        target: /var/www/config
      - type: bind
        source: ../Back-end/routes
        target: /var/www/routes
      - type: bind
        source: ../Back-end/resources
        target: /var/www/resources
      - type: bind
        source: ../Back-end/database
        target: /var/www/database
      - type: bind
        source: ../Back-end/.env
        target: /var/www/.env

  # ─── MySQL (dev override) ────────────────────────────────────
  mysql:
    ports:
      - "3307:3306"

  # ─── phpMyAdmin profile guard ───────────────────────────────
  phpmyadmin:
    profiles:
      - dev

