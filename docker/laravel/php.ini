[PHP]
; Logging
error_log = /var/www/storage/logs/php-fpm.log

; File uploads
upload_max_filesize = 64M
post_max_size       = 64M

; Execution limits
max_execution_time = 300
max_input_time     = 300
memory_limit       = 256M

; Timezone
date.timezone = Africa/Casablanca

[Opcache]
opcache.enable                = 1
opcache.memory_consumption    = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000
; IMPORTANT for development: set to 1 so PHP re-validates file timestamps
; on every request. Otherwise edited files are served from cache and your
; code changes won't be visible without manually clearing the opcache.
; In production this is set to 0 for maximum performance.
opcache.revalidate_freq       = 0
opcache.validate_timestamps   = 1
opcache.fast_shutdown         = 1

[Redis]
; Store PHP sessions in Redis (shared across PHP-FPM workers)
session.save_handler = redis
session.save_path    = "tcp://redis:6379?auth=&prefix=electro_session_"
